<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relatório de Atividades Diárias</title>
  <link rel="stylesheet" href="style.css?v=5" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <img src="logo.png" alt="Convictiva Comunicação" class="header-logo" />
          <span>Relatório de Atividades Diárias</span>
        </div>
        <div class="header-actions">
          <button class="btn btn-ghost" id="btn-clear" title="Limpar formulário">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>
            <span>Limpar</span>
          </button>
          <button class="btn btn-secondary" id="btn-preview">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <span>Visualizar</span>
          </button>
          <div class="save-wrapper" id="save-wrapper">
            <button class="btn btn-primary" id="btn-save-toggle">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              <span>Salvar</span>
              <svg class="chevron-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div class="save-menu hidden" id="save-menu">
              <button class="save-option" data-format="doc">
                <span class="save-opt-icon word">W</span>
                <span class="save-opt-label"><strong>Word</strong><small>Arquivo .rtf</small></span>
              </button>
              <button class="save-option" data-format="pdf">
                <span class="save-opt-icon pdf">PDF</span>
                <span class="save-opt-label"><strong>PDF</strong><small>Arquivo .pdf</small></span>
              </button>
              <button class="save-option" data-format="png">
                <span class="save-opt-icon img">PNG</span>
                <span class="save-opt-label"><strong>Imagem PNG</strong><small>Alta qualidade</small></span>
              </button>
              <button class="save-option" data-format="jpeg">
                <span class="save-opt-icon img">JPG</span>
                <span class="save-opt-label"><strong>Imagem JPEG</strong><small>Menor tamanho</small></span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </header>

    <div class="page-title-mobile">Relatório de Atividades Diárias</div>

    <main class="main">
      <div class="container">
        <!-- Form Panel -->
        <div class="panel form-panel" id="form-panel">
          <div class="panel-header">
            <h2>Novo Relatório</h2>
            <span class="badge hidden" id="status-badge"></span>
          </div>

          <form id="report-form" novalidate>
            <!-- Identificação -->
            <section class="form-section">
              <h3 class="section-title">
                <span class="section-icon">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </span>
                Identificação
              </h3>
              <div class="form-row">
                <div class="form-group">
                  <label for="date">Data <span class="required">*</span></label>
                  <input type="date" id="date" name="date" required />
                </div>
                <div class="form-group">
                  <label for="name">Colaborador <span class="required">*</span></label>
                  <input type="text" id="name" name="name" placeholder="Nome completo" required />
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label for="department">Departamento</label>
                  <input type="text" id="department" name="department" placeholder="Ex: Desenvolvimento, TI, RH…" />
                </div>
                <div class="form-group">
                  <label for="project">Projeto / Cliente</label>
                  <input type="text" id="project" name="project" placeholder="Nome do projeto" />
                </div>
              </div>
            </section>

            <!-- Tarefas realizadas -->
            <section class="form-section">
              <h3 class="section-title">
                <span class="section-icon">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
                </span>
                Tarefas Realizadas
              </h3>
              <div id="tasks-container"></div>
              <button type="button" class="btn-add" id="btn-add-task">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Adicionar tarefa
              </button>
            </section>

            <!-- Bloqueios -->
            <section class="form-section">
              <h3 class="section-title">
                <span class="section-icon">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                </span>
                Problemas / Bloqueios
              </h3>
              <div class="form-group">
                <textarea id="blockers" name="blockers" rows="3" placeholder="Descreva impedimentos, dificuldades ou riscos… (deixe em branco se não houver)"></textarea>
              </div>
            </section>

            <!-- Plano amanhã -->
            <section class="form-section">
              <h3 class="section-title">
                <span class="section-icon">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                </span>
                Plano para Amanhã
              </h3>
              <div id="plans-container"></div>
              <button type="button" class="btn-add" id="btn-add-plan">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Adicionar item
              </button>
            </section>

            <!-- Observações -->
            <section class="form-section">
              <h3 class="section-title">
                <span class="section-icon">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                </span>
                Observações Gerais
              </h3>
              <div class="form-group">
                <textarea id="notes" name="notes" rows="3" placeholder="Anotações adicionais, reuniões, feedbacks…"></textarea>
              </div>
            </section>

            <!-- Horas -->
            <section class="form-section">
              <h3 class="section-title">
                <span class="section-icon">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                </span>
                Horas Trabalhadas
              </h3>
              <div class="form-row narrow">
                <div class="form-group">
                  <label for="hours-start">Entrada</label>
                  <input type="time" id="hours-start" name="hours-start" />
                </div>
                <div class="form-group">
                  <label for="hours-end">Saída</label>
                  <input type="time" id="hours-end" name="hours-end" />
                </div>
                <div class="form-group">
                  <label for="hours-total">Total (h)</label>
                  <input type="number" id="hours-total" name="hours-total" min="0" max="24" step="0.5" placeholder="0" readonly />
                </div>
              </div>
            </section>
          </form>
        </div>

        <!-- Preview Panel -->
        <div class="panel preview-panel hidden" id="preview-panel">
          <div class="panel-header">
            <h2>Pré-visualização</h2>
            <button class="btn btn-ghost btn-sm" id="btn-close-preview">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              Fechar
            </button>
          </div>
          <div id="preview-content" class="report-preview"></div>
          <div class="preview-footer">
            <div class="save-wrapper" id="save-wrapper-preview">
              <button class="btn btn-primary" id="btn-save-preview-toggle">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Salvar como…
                <svg class="chevron-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
              </button>
              <div class="save-menu save-menu-up hidden" id="save-menu-preview">
                <button class="save-option" data-format="doc">
                  <span class="save-opt-icon word">W</span>
                  <span class="save-opt-label"><strong>Word</strong><small>Arquivo .rtf</small></span>
                </button>
                <button class="save-option" data-format="pdf">
                  <span class="save-opt-icon pdf">PDF</span>
                  <span class="save-opt-label"><strong>PDF</strong><small>Arquivo .pdf</small></span>
                </button>
                <button class="save-option" data-format="png">
                  <span class="save-opt-icon img">PNG</span>
                  <span class="save-opt-label"><strong>Imagem PNG</strong><small>Alta qualidade</small></span>
                </button>
                <button class="save-option" data-format="jpeg">
                  <span class="save-opt-icon img">JPG</span>
                  <span class="save-opt-label"><strong>Imagem JPEG</strong><small>Menor tamanho</small></span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Print area (hidden, used for PDF) -->
    <div id="print-area"></div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="app.js?v=3"></script>
</body>
</html>
